<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoamTassie — Admin</title>
<style>
  :root {
    --brand: #0B2545; --accent: #F26B3A; --bg: #F3F0E9;
    --card: #fff; --ink: #0B2545; --muted: #6B7A90; --line: #E4DFD3;
    --ok: #1F7A5C; --warn: #b45309; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; }
  header {
    background: var(--brand); color: #fff;
    padding: 0 28px; display: flex; align-items: center; gap: 16px; height: 56px;
  }
  header h1 { font-size: 18px; font-weight: 600; margin: 0; }
  header span { opacity: 0.55; font-size: 13px; }
  .tabs {
    display: flex; gap: 2px; padding: 16px 28px 0;
  }
  .tab {
    padding: 10px 20px; border-radius: 8px 8px 0 0;
    border: 1px solid var(--line); border-bottom: 0;
    cursor: pointer; background: var(--bg); color: var(--muted);
    font-weight: 500; font-size: 14px;
  }
  .tab.active { background: var(--card); color: var(--ink); }
  .panel { display: none; padding: 0 28px 28px; }
  .panel.active { display: block; }
  .filters {
    display: flex; gap: 8px; align-items: center; padding: 16px 0;
    border-bottom: 1px solid var(--line); margin-bottom: 16px; flex-wrap: wrap;
  }
  .filters button {
    padding: 7px 14px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; font-size: 13px; color: var(--muted);
  }
  .filters button.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .filters .count {
    margin-left: auto; font-size: 13px; color: var(--muted);
  }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); }
  th { background: var(--bg); text-align: left; padding: 10px 14px; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--line); }
  td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: #fafaf7; }
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; white-space: nowrap;
  }
  .badge.new      { background: #dbeafe; color: #1d4ed8; }
  .badge.contacted{ background: #fef3c7; color: var(--warn); }
  .badge.booked   { background: #d1fae5; color: var(--ok); }
  .badge.closed   { background: var(--bg); color: var(--muted); }
  .name { font-weight: 600; }
  .muted { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .price { font-weight: 600; color: var(--accent); }
  select.status-sel {
    border: 1px solid var(--line); border-radius: 6px; padding: 5px 8px;
    font-size: 13px; background: var(--bg); cursor: pointer; color: var(--ink);
  }
  .loading { text-align: center; padding: 48px; color: var(--muted); }
  .empty   { text-align: center; padding: 48px; color: var(--muted); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>RoamTassie</h1>
  <span>Admin dashboard</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('quotes')">Quote leads</div>
  <div class="tab" onclick="showTab('contacts')">Contact messages</div>
</div>

<div id="quotes-panel" class="panel active">
  <div class="filters">
    <button class="active" onclick="filterQuotes('all', this)">All</button>
    <button onclick="filterQuotes('new', this)">New</button>
    <button onclick="filterQuotes('contacted', this)">Contacted</button>
    <button onclick="filterQuotes('booked', this)">Booked</button>
    <button onclick="filterQuotes('closed', this)">Closed</button>
    <span class="count" id="q-count"></span>
  </div>
  <div id="quotes-body"><div class="loading">Loading…</div></div>
</div>

<div id="contacts-panel" class="panel">
  <div id="contacts-body"><div class="loading">Loading…</div></div>
</div>

<script>
let allQuotes = [];
let currentFilter = 'all';

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['quotes','contacts'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name + '-panel').classList.add('active');
}

async function fetchQuotes() {
  const res = await fetch('/api/admin/quotes');
  if (!res.ok) { document.getElementById('quotes-body').innerHTML = '<div class="empty">Failed to load.</div>'; return; }
  allQuotes = await res.json();
  renderQuotes();
}

function filterQuotes(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuotes();
}

function renderQuotes() {
  const rows = currentFilter === 'all' ? allQuotes : allQuotes.filter(q => q.status === currentFilter);
  document.getElementById('q-count').textContent = rows.length + ' result' + (rows.length !== 1 ? 's' : '');
  if (!rows.length) {
    document.getElementById('quotes-body').innerHTML = '<div class="empty">No quotes yet.</div>';
    return;
  }
  document.getElementById('quotes-body').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Customer</th><th>Route</th><th>Size</th>
        <th>Move date</th><th>Estimate</th><th>Source</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${rows.map(q => `
          <tr>
            <td><span class="muted">${fmtDate(q.created_at)}</span></td>
            <td>
              <div class="name">${esc(q.name)}</div>
              <div class="muted"><a href="mailto:${esc(q.email)}">${esc(q.email)}</a></div>
              ${q.phone ? `<div class="muted"><a href="tel:${esc(q.phone)}">${esc(q.phone)}</a></div>` : ''}
            </td>
            <td>${esc(q.from_region)} → ${esc(q.to_region)}</td>
            <td>${esc(q.home_size)}</td>
            <td>${q.move_date || '—'}</td>
            <td class="price">${q.estimate ? '$' + q.estimate : '—'}</td>
            <td><span class="muted">${esc(q.source || '')}</span></td>
            <td>
              <select class="status-sel" onchange="updateStatus(${q.id}, this.value)">
                ${['new','contacted','booked','closed'].map(s =>
                  `<option value="${s}" ${q.status === s ? 'selected' : ''}>${cap(s)}</option>`
                ).join('')}
              </select>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function updateStatus(id, status) {
  await fetch('/api/admin/quotes/' + id, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status})
  });
  const q = allQuotes.find(x => x.id === id);
  if (q) q.status = status;
}

async function fetchContacts() {
  const res = await fetch('/api/admin/contacts');
  if (!res.ok) return;
  const rows = await res.json();
  if (!rows.length) {
    document.getElementById('contacts-body').innerHTML = '<div class="empty">No messages yet.</div>';
    return;
  }
  document.getElementById('contacts-body').innerHTML = `
    <table>
      <thead><tr><th>Date</th><th>Name</th><th>Message</th></tr></thead>
      <tbody>
        ${rows.map(c => `
          <tr>
            <td><span class="muted">${fmtDate(c.created_at)}</span></td>
            <td>
              <div class="name">${esc(c.name)}</div>
              <div class="muted"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></div>
              ${c.phone ? `<div class="muted">${esc(c.phone)}</div>` : ''}
            </td>
            <td style="max-width:480px;white-space:pre-wrap">${esc(c.message)}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

document.querySelectorAll('.tab')[1].addEventListener('click', fetchContacts, {once: true});

function fmtDate(s) {
  const d = new Date(s.replace(' ', 'T') + 'Z');
  return d.toLocaleString('en-AU', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

fetchQuotes();
</script>
</body>
</html>
